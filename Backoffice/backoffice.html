<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS Backoffice System — SPA</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="backoffice.css" />
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>POS Backoffice</h2>
      </div>
      <nav class="sidebar-menu">
        <ul>
          <li><a data-route="dashboard" class="active"><i class="fas fa-home"></i><span>Dashboard</span></a></li>
          <li><a data-route="terminals"><i class="fas fa-cash-register"></i><span>POS Terminals</span></a></li>
          <li><a data-route="cashiers"><i class="fas fa-users"></i><span>Cashiers</span></a></li>
          <li><a data-route="inventory"><i class="fas fa-boxes"></i><span>Inventory</span></a></li>
          <li><a data-route="sales"><i class="fas fa-shopping-cart"></i><span>Sales</span></a></li>
          <li><a data-route="cash"><i class="fas fa-money-bill-wave"></i><span>Cash Management</span></a></li>
          <li><a data-route="reports"><i class="fas fa-chart-bar"></i><span>Reports</span></a></li>
          <li><a data-route="sync"><i class="fas fa-sync-alt"></i><span>Sync Status</span></a></li>
          <li><a data-route="bank"><i class="fas fa-university"></i><span>Bank Accounts</span></a></li>
          <li><a data-route="settings"><i class="fas fa-cog"></i><span>Settings</span></a></li>
          <li><a data-route="logout"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a></li>
        </ul>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="header">
        <div class="header-left">
          <h1 id="page-title">Dashboard Overview</h1>
          <p id="current-time">—</p>
        </div>
        <div class="user-profile">
          <button class="btn btn-outline" id="toggle-theme" title="Toggle dark mode"><i class="fa-solid fa-moon"></i></button>
          <div class="user-avatar">AJ</div>
          <div>
            <div style="font-weight:700">Admin User</div>
            <div style="color:var(--muted); font-size:.9rem">Administrator</div>
          </div>
        </div>
      </header>

      <section id="app" class="content"><!-- views render here --></section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <!-- Modal root -->
  <div id="modal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close></div>
    <div class="dialog" role="dialog" aria-modal="true">
      <header>
        <h3 id="modal-title" style="margin:0">Modal</h3>
        <button class="btn btn-ghost" data-close><i class="fa fa-times"></i></button>
      </header>
      <div id="modal-body"></div>
      <div style="margin-top:1rem; display:flex; justify-content:flex-end; gap:.5rem">
        <button class="btn btn-ghost" data-close>Cancel</button>
        <button class="btn btn-primary" id="modal-submit">Save</button>
      </div>
    </div>
  </div>

  <script src="backoffice.js"></script>
</body>
</html>
