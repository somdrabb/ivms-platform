<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>POS Backoffice System — SPA</title>
  <meta
    name="description"
    content="POS Backoffice single-page application for dashboards, terminals, cashiers, inventory, sales, cash management, reports, sync, bank accounts, and settings."
  />
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <link rel="stylesheet" href="backoffice.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar" aria-label="Primary sidebar">
      <div class="sidebar-header">
        <h2>POS Backoffice</h2>
      </div>

      <nav class="sidebar-menu" aria-label="Backoffice navigation">
        <div id="sidebar-nav"></div>
      </nav>
    </aside>

    <main class="main" id="main-content">
      <header class="header">
        <div class="header-left">
          <h1 id="page-title">Dashboard Overview</h1>
          <p id="current-time">—</p>
        </div>

        <div class="user-profile" aria-label="Current user">
          <button
            class="btn btn-outline"
            id="toggle-theme"
            type="button"
            title="Toggle dark mode"
            aria-label="Toggle dark mode"
          >
            <i class="fa-solid fa-moon" aria-hidden="true"></i>
          </button>

          <div class="user-avatar" aria-hidden="true">AJ</div>

          <div class="user-meta">
            <strong>Admin User</strong>
            <span>Administrator</span>
          </div>
        </div>
      </header>

      <section id="app" class="content" aria-live="polite">
        <!-- SPA views render here -->
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>

  <div id="modal" class="modal" aria-hidden="true">
    <div class="backdrop" data-close></div>

    <div
      class="dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="modal-title"
      tabindex="-1"
    >
      <header class="modal-header">
        <h3 id="modal-title">Modal</h3>
        <button
          class="btn btn-ghost"
          type="button"
          data-close
          aria-label="Close modal"
        >
          <i class="fa-solid fa-xmark" aria-hidden="true"></i>
        </button>
      </header>

      <div id="modal-body" class="modal-body"></div>

      <footer class="modal-actions">
        <button class="btn btn-ghost" type="button" data-close>Cancel</button>
        <button class="btn btn-primary" type="button" id="modal-submit">Save</button>
      </footer>
    </div>
  </div>

  <script type="module" src="backoffice.js"></script>
</body>
</html>
